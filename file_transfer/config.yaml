# =============================================================================
# File Transfer Automation - Routing Configuration
# Each rule maps a file-name pattern to one or more destination handlers.
# =============================================================================

rules:
  # ── DLP-visible GUI uploads (desktop_agent) ──────────────────────
  # These use native GUI automation so endpoint DLP agents can detect
  # the file transfer.  Slack uses a scripted native flow (no API key
  # needed); other apps use Claude Computer Use.

  # Rule 1 – Send every PDF to Slack via native desktop app
  - name: pdf_reports
    pattern: "*.pdf"
    handlers:
      - type: desktop_agent
        app: slack
        channel: "#general"
        message: "New PDF report uploaded"

  # Rule 2 – Copy spreadsheets to a local/network backup folder
  - name: spreadsheet_backup
    pattern: "*.xlsx"
    handlers:
      - type: local_copy

  # Rule 3 – Upload CSVs to the remote SFTP server
  - name: csv_sync
    pattern: "*.csv"
    handlers:
      - type: sftp

  # Rule 4 – Send Word docs to Teams (GUI) and OneDrive
  - name: word_docs
    pattern: "*.docx"
    handlers:
      - type: desktop_agent
        app: teams
        team: "Security Team"
        channel: "DLP Tests"
        message: "New document shared"
      - type: onedrive

  # Rule 5 – Send images to Telegram and WhatsApp (GUI)
  - name: image_alerts
    pattern: "*.png"
    handlers:
      - type: desktop_agent
        app: telegram
        chat: "DLP Testing"
        message: "Image uploaded"
      - type: desktop_agent
        app: whatsapp
        contact: "DLP Test Group"
        message: "New image"

  # Rule 6 – Archive ZIPs to Box
  - name: archive_sync
    pattern: "*.zip"
    handlers:
      - type: box

  # Rule 7 – Send large files via WeTransfer
  - name: wetransfer_large
    pattern: "*.iso"
    handlers:
      - type: wetransfer
        message: "Large file transfer"

  # Rule 8 – Route test .txt files (DLP test battery)
  - name: txt_all_services
    pattern: "*.txt"
    handlers:
      - type: box
      - type: dropbox
      - type: onedrive
      - type: wetransfer
        message: "DLP test file transfer"
      - type: local_copy
      - type: desktop_agent
        app: slack
        channel: "#dlp-testing"
        message: "DLP test file detected"

  # Rule 9 – Notify Zoom chat about logs
  - name: log_notify
    pattern: "*.log"
    handlers:
      - type: zoom
        message: "New log file"

  # Rule 10 – Catch-all: send to Slack via native GUI
  - name: catch_all
    pattern: "*"
    handlers:
      - type: desktop_agent
        app: slack
        channel: "#general"
        message: "New file detected"
